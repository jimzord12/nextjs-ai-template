name: Code Quality Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Commitlint Globally
        run: bun add -g @commitlint/cli @commitlint/config-conventional

      - name: Verify Commit History
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            bunx commitlint --from ${{ github.event.target_branch || github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
          else
            bunx commitlint --from ${{ github.event.before }} --to ${{ github.event.after }} --verbose
          fi

  biome:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Biome Toolchain
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run Quality Checks
        run: biome ci .

  typescript:
    name: Type Integrity Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Project Dependencies
        run: bun install --frozen-lockfile

      - name: Compile TypeScript
        run: bunx tsc --noEmit

  unit-tests:
    name: Run Vitest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Project Dependencies
        run: bun install --frozen-lockfile

      # Executes Vitest once without watch mode
      - name: Run Vitest
        run: bun run test

  e2e-tests:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-latest
    # Wait for unit tests and type checks to pass before running expensive E2E tests
    needs: [typescript, unit-tests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Project Dependencies
        run: bun install --frozen-lockfile

      # Detects current Playwright version to look up cached browsers
      - name: Get Playwright Version
        id: playwright-version
        run: echo "version=$(bun pm ls --json | grep -oP '"@playwright/test":\s*"\K[^"]+')" >> $GITHUB_OUTPUT

      # Caches Playwright browsers to shave minutes off your execution time
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # Installs Chromium/Firefox/Webkit only if cache misses
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps

      # Installs system dependencies if cache hits (keeps OS packages updated)
      - name: Install Playwright System Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps

      - name: Run Playwright Tests
        run: bun run test:e2e

      # Uploads reports as artifacts so you can inspect UI test failures locally
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
